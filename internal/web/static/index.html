<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipal Management</title>
    <script>
        (function () {
            try {
                var stored = localStorage.getItem('clipal.locale');
                var locale = stored === 'zh-CN' ? 'zh-CN' : 'en';
                document.documentElement.lang = locale;
                document.title = locale === 'zh-CN' ? 'Clipal 管理界面' : 'Clipal Management';
            } catch (error) {
                document.documentElement.lang = 'en';
                document.title = 'Clipal Management';
            }
        })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/static/clipal-icon.svg">
    <link rel="stylesheet" href="/static/styles/tokens.css">
    <link rel="stylesheet" href="/static/styles/base.css">
    <link rel="stylesheet" href="/static/styles/primitives.css">
    <link rel="stylesheet" href="/static/styles/components.css">
    <link rel="stylesheet" href="/static/styles/pages.css">
    <script defer src="/static/alpine.min.js"></script>
    <script src="/static/sortable.min.js"></script>
</head>

<body x-data="app()" x-init="init()">

    <!-- Loading Overlay -->
    <div class="loading-overlay" :class="{'active': isLoading}">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="brand-lockup">
                <img src="/static/clipal-icon.svg" alt="" class="brand-mark">
                <div class="brand-copy">
                    <div class="flex items-center gap-3">
                        <h1>Clipal</h1>
                        <span class="pill pill--xs pill--neutral pill--mono" x-text="status.version"></span>
                    </div>
                    <p class="brand-subtitle" x-text="t('header.subtitle')"></p>
                </div>
            </div>
            <div class="header-info">
                <div class="segmented-group locale-switcher" role="radiogroup" :aria-label="t('locale.label')">
                    <button type="button" class="segment-btn" role="radio" lang="en" x-ref="localeEn"
                        :class="{'active': locale === 'en'}" :aria-checked="locale === 'en'"
                        :aria-label="t('locale.english')" @click="setLocale('en')"
                        @keydown.left.prevent="moveLocale(-1)" @keydown.up.prevent="moveLocale(-1)"
                        @keydown.right.prevent="moveLocale(1)" @keydown.down.prevent="moveLocale(1)">EN</button>
                    <button type="button" class="segment-btn" role="radio" lang="zh-CN" x-ref="localeZh"
                        :class="{'active': locale === 'zh-CN'}" :aria-checked="locale === 'zh-CN'"
                        :aria-label="t('locale.chinese')" @click="setLocale('zh-CN')"
                        @keydown.left.prevent="moveLocale(-1)" @keydown.up.prevent="moveLocale(-1)"
                        @keydown.right.prevent="moveLocale(1)" @keydown.down.prevent="moveLocale(1)">中文</button>
                </div>
                <button @click="toggleTheme()" class="theme-toggle" :title="tf('theme.current', { theme: themeLabel })">
                    <span x-text="themeIcon"></span>
                </button>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="tabs" role="tablist" :aria-label="t('nav.sectionsLabel')">
            <button id="tabbtn-providers" role="tab" :tabindex="activeTab === 'providers' ? 0 : -1"
                :aria-selected="activeTab === 'providers'" aria-controls="tab-providers"
                @click="activeTab = 'providers'" :class="{'active': activeTab === 'providers'}" class="tab"
                x-text="t('nav.providers')"></button>
            <button id="tabbtn-integrations" role="tab" :tabindex="activeTab === 'integrations' ? 0 : -1"
                :aria-selected="activeTab === 'integrations'" aria-controls="tab-integrations"
                @click="activeTab = 'integrations'" :class="{'active': activeTab === 'integrations'}" class="tab"
                x-text="t('nav.integrations')"></button>
            <button id="tabbtn-settings" role="tab" :tabindex="activeTab === 'settings' ? 0 : -1"
                :aria-selected="activeTab === 'settings'" aria-controls="tab-settings" @click="activeTab = 'settings'"
                :class="{'active': activeTab === 'settings'}" class="tab" x-text="t('nav.settings')"></button>
            <button id="tabbtn-services" role="tab" :tabindex="activeTab === 'services' ? 0 : -1"
                :aria-selected="activeTab === 'services'" aria-controls="tab-services" @click="activeTab = 'services'"
                :class="{'active': activeTab === 'services'}" class="tab" x-text="t('nav.services')"></button>
            <button id="tabbtn-status" role="tab" :tabindex="activeTab === 'status' ? 0 : -1"
                :aria-selected="activeTab === 'status'" aria-controls="tab-status" @click="activeTab = 'status'"
                :class="{'active': activeTab === 'status'}" class="tab" x-text="t('nav.status')"></button>
        </nav>

        <!-- Toast Messages -->
        <div class="toast-stack" aria-live="polite" aria-atomic="false">
            <template x-for="toast in toasts" :key="toast.id">
                <div class="toast" :class="`toast--${toast.type}`" :role="toast.type === 'error' ? 'alert' : 'status'"
                    @mouseenter="pauseToast(toast.id)" @mouseleave="resumeToast(toast.id)"
                    x-transition:enter="transition ease-out duration-220"
                    x-transition:enter-start="opacity-0 translate-y-2 scale-[0.98]"
                    x-transition:enter-end="opacity-100 translate-y-0 scale-100"
                    x-transition:leave="transition ease-in duration-180"
                    x-transition:leave-start="opacity-100 translate-y-0 scale-100"
                    x-transition:leave-end="opacity-0 -translate-y-1 scale-[0.98]">
                    <div class="toast__header">
                        <span class="badge badge--xs badge--mono toast__badge" :class="`toast__badge--${toast.type}`"
                            x-text="toastTypeLabel(toast.type)"></span>
                        <div class="toast__title" x-text="toast.title"></div>
                        <button type="button" class="toast__close" @click="dismissToast(toast.id)"
                            :aria-label="t('toast.dismissNotification')">×</button>
                    </div>
                    <div class="toast__message" x-text="toast.message"></div>
                </div>
            </template>
        </div>

        <!-- Providers Tab -->
        <div id="tab-providers" role="tabpanel" aria-labelledby="tabbtn-providers" x-show="activeTab === 'providers'"
            x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2"
            x-transition:enter-end="opacity-100 translate-y-0">
            <!-- Client Switcher -->
            <div class="client-switcher-container">
                <div class="client-switcher">
                    <div class="segmented-group" role="tablist" :aria-label="t('providers.clientTypeLabel')">
                        <template x-for="client in clientOptions" :key="client.value">
                            <button type="button" @click="selectClient(client.value)"
                                :class="{'active': selectedClient === client.value}" class="segment-btn"
                                x-text="client.label">
                            </button>
                        </template>
                    </div>

                    <button @click="openAddProviderModal()" class="btn btn-primary btn-full">
                        <span x-text="tf('providers.addTo', { client: clientLabel(selectedClient) })"></span>
                    </button>

                    <!-- Client Mode (compact) -->
                    <div class="client-mode-row">
                        <div class="client-mode-left">
                            <span class="client-mode-label" x-text="t('providers.modeLabel')"></span>
                            <span class="mode-pill pill pill-xs"
                                :class="clientConfig.mode === 'auto' ? 'mode-auto' : 'mode-manual'"
                                x-text="modeLabel(clientConfig.mode)"></span>
                            <span class="tooltip" :aria-label="t('providers.modeLabel')">
                                <button type="button" class="info-btn" :aria-label="t('providers.modeLabel')">i</button>
                                <span class="tooltip-content" x-text="modeHelpText()"></span>
                            </span>
                        </div>

                        <div class="client-mode-middle" x-show="clientConfig.mode === 'manual'">
                            <span class="client-mode-label" x-text="t('providers.pinned')"></span>
                            <span class="pill pill--sm pill--neutral pill--mono"
                                x-text="clientConfig.pinned_provider || t('common.none')"></span>
                        </div>

                        <div class="client-mode-right">
                            <button type="button" class="btn btn-secondary btn-sm"
                                :disabled="clientConfig.mode === 'auto' && !hasEnabledProviders"
                                :title="modeToggleTitle()"
                                @click="setClientMode(clientConfig.mode === 'auto' ? 'manual' : 'auto')"
                                x-text="modeToggleLabel()">
                            </button>
                        </div>
                    </div>

                    <div class="form-hint" x-show="clientConfig.mode === 'manual'" x-text="t('providers.pinHint')">
                    </div>
                </div>
            </div>

            <!-- Providers List -->
            <div id="providers-list" class="card-grid">
                <template x-if="providers.length === 0">
                    <div class="card u-text-center" style="grid-column: 1 / -1; padding: 60px;">
                        <p style="color: var(--text-secondary)"
                            x-text="tf('providers.empty', { client: clientLabel(selectedClient) })"></p>
                    </div>
                </template>

                <template x-for="provider in providers" :key="provider.name">
                    <div class="card provider-card" :data-id="provider.name" :title="t('providers.dragToReorder')">
                        <div class="provider-card__header">
                            <div class="provider-card__info">
                                <div class="provider-card__title-row">
                                    <span class="priority-badge badge badge-xs badge-outline badge-mono"
                                        x-text="'#' + provider.priority"></span>
                                    <h3 class="provider-name provider-card__title" x-text="provider.name"></h3>
                                    <template
                                        x-if="clientConfig.mode === 'manual' && provider.name === clientConfig.pinned_provider">
                                        <span class="pin-badge badge badge-xs badge-warning"
                                            :title="providerPinBadgeTitle()" x-text="t('providers.pinBadge')"></span>
                                    </template>
                                </div>
                                <span
                                    :class="'provider-card__status ' + (provider.enabled ? 'provider-card__status--enabled' : 'provider-card__status--disabled')"
                                    x-text="providerStatusText(provider.enabled)">
                                </span>
                            </div>
                            <div class="provider-card__controls">
                                <label class="switch" :title="providerToggleTitle(provider)">
                                    <input type="checkbox" :checked="provider.enabled"
                                        :disabled="clientConfig.mode === 'manual' && provider.name === clientConfig.pinned_provider && provider.enabled"
                                        @change="toggleProvider(provider, $event)">
                                    <span class="slider"></span>
                                </label>
                                <button @click="pinProvider(provider.name)" class="icon-btn"
                                    :class="{'pin-active': clientConfig.mode === 'manual' && provider.name === clientConfig.pinned_provider}"
                                    :title="providerPinTitle(provider)" :disabled="!provider.enabled">📌</button>
                                <button @click="editProvider(provider)" class="icon-btn"
                                    :title="t('providers.edit')">✏️</button>
                                <button @click="deleteProvider(provider.name)" class="icon-btn danger"
                                    :title="t('providers.delete')">🗑️</button>
                            </div>
                        </div>
                        <div class="provider-card__details">
                            <div class="provider-card__detail">
                                <span class="provider-card__detail-label" x-text="t('providers.baseUrl')"></span>
                                <span class="provider-card__detail-value" x-text="provider.base_url"></span>
                            </div>
                            <div class="provider-card__detail">
                                <span class="provider-card__detail-label" x-text="t('providers.apiKeys')"></span>
                                <span class="provider-card__detail-value"
                                    x-text="configuredKeyCountLabel(provider.key_count || 0)"></span>
                            </div>
                            <div class="provider-card__detail" x-show="provider.overrides && provider.overrides.model">
                                <span class="provider-card__detail-label" x-text="t('providers.model')"></span>
                                <span class="provider-card__detail-value" x-text="provider.overrides.model"></span>
                            </div>
                            <div class="provider-card__detail"
                                x-show="provider.overrides && provider.overrides.openai && provider.overrides.openai.reasoning_effort">
                                <span class="provider-card__detail-label"
                                    x-text="t('providers.reasoningEffort')"></span>
                                <span class="provider-card__detail-value"
                                    x-text="provider.overrides.openai.reasoning_effort"></span>
                            </div>
                            <div class="provider-card__detail"
                                x-show="provider.overrides && provider.overrides.claude && provider.overrides.claude.thinking_budget_tokens > 0">
                                <span class="provider-card__detail-label"
                                    x-text="t('providers.thinkingBudgetTokens')"></span>
                                <span class="provider-card__detail-value"
                                    x-text="provider.overrides.claude.thinking_budget_tokens"></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="tab-settings" role="tabpanel" aria-labelledby="tabbtn-settings" x-show="activeTab === 'settings'"
            x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2"
            x-transition:enter-end="opacity-100 translate-y-0">
            <form @submit.prevent="saveGlobalConfig()">
                <div class="settings-page-header">
                    <div>
                        <h3 class="provider-name" x-text="t('settings.title')"></h3>
                        <div class="settings-page-copy" x-text="t('settings.subtitle')"></div>
                    </div>
                    <div class="settings-toolbar-actions">
                        <button type="button" @click="loadGlobalConfig()" class="btn btn-secondary"
                            x-text="t('common.reset')"></button>
                        <button type="button" @click="exportConfig()" class="btn btn-secondary"
                            x-text="t('common.export')"></button>
                        <button type="submit" class="btn btn-primary" x-text="t('common.save')"></button>
                    </div>
                </div>

                <div class="settings-compact-grid">
                    <section class="settings-panel">
                        <div class="settings-panel-header">
                            <div>
                                <h3 x-text="t('settings.runtimeTitle')"></h3>
                                <p class="settings-panel-copy" x-text="t('settings.runtimeCopy')"></p>
                            </div>
                        </div>
                        <div class="settings-panel-grid">
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.listenAddress')"></label>
                                <input type="text" x-model="globalConfig.listen_addr" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.port')"></label>
                                <input type="number" x-model.number="globalConfig.port" class="form-input" required
                                    min="1" max="65535">
                            </div>
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.logLevel')"></label>
                                <select x-model="globalConfig.log_level" class="form-select">
                                    <option value="debug" x-text="levelLabel('debug')"></option>
                                    <option value="info" x-text="levelLabel('info')"></option>
                                    <option value="warn" x-text="levelLabel('warn')"></option>
                                    <option value="error" x-text="levelLabel('error')"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.maxBodySize')"></label>
                                <input type="number" x-model.number="globalConfig.max_request_body_bytes"
                                    class="form-input" required min="1">
                                <div class="form-hint" x-text="t('settings.maxBodySizeHint')"></div>
                            </div>
                        </div>
                    </section>

                    <section class="settings-panel">
                        <div class="settings-panel-header">
                            <div>
                                <h3 x-text="t('settings.reliabilityTitle')"></h3>
                                <p class="settings-panel-copy" x-text="t('settings.reliabilityCopy')"></p>
                            </div>
                        </div>
                        <div class="settings-panel-grid">
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.reactivateAfter')"></label>
                                <input type="text" x-model="globalConfig.reactivate_after" class="form-input" required>
                                <div class="form-hint" x-text="t('settings.reactivateAfterHint')"></div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.upstreamIdleTimeout')"></label>
                                <input type="text" x-model="globalConfig.upstream_idle_timeout" class="form-input"
                                    required>
                                <div class="form-hint" x-text="t('settings.upstreamIdleTimeoutHint')"></div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.responseHeaderTimeout')"></label>
                                <input type="text" x-model="globalConfig.response_header_timeout" class="form-input"
                                    required>
                                <div class="form-hint" x-text="t('settings.responseHeaderTimeoutHint')"></div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.failureThreshold')"></label>
                                <input type="number" x-model.number="globalConfig.circuit_breaker.failure_threshold"
                                    class="form-input" required min="0">
                                <div class="form-hint" x-text="t('settings.failureThresholdHint')"></div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.successThreshold')"></label>
                                <input type="number" x-model.number="globalConfig.circuit_breaker.success_threshold"
                                    class="form-input" required min="1">
                            </div>
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.openTimeout')"></label>
                                <input type="text" x-model="globalConfig.circuit_breaker.open_timeout"
                                    class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.halfOpenMaxInflight')"></label>
                                <input type="number"
                                    x-model.number="globalConfig.circuit_breaker.half_open_max_inflight"
                                    class="form-input" required min="1">
                            </div>
                        </div>
                    </section>

                    <section class="settings-panel">
                        <div class="settings-panel-header">
                            <div>
                                <h3 x-text="t('settings.logsAlertsTitle')"></h3>
                                <p class="settings-panel-copy" x-text="t('settings.logsAlertsCopy')"></p>
                            </div>
                        </div>
                        <div class="settings-panel-grid">
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.logDirectory')"></label>
                                <input type="text" x-model="globalConfig.log_dir" class="form-input">
                                <div class="form-hint" x-text="t('settings.logDirectoryHint')"></div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.retentionDays')"></label>
                                <input type="number" x-model.number="globalConfig.log_retention_days" class="form-input"
                                    min="0">
                                <div class="form-hint" x-text="t('settings.retentionDaysHint')"></div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.notificationLevel')"></label>
                                <select x-model="globalConfig.notifications.min_level" class="form-select">
                                    <option value="debug" x-text="levelLabel('debug')"></option>
                                    <option value="info" x-text="levelLabel('info')"></option>
                                    <option value="warn" x-text="levelLabel('warn')"></option>
                                    <option value="error" x-text="levelLabel('error')"></option>
                                </select>
                            </div>
                        </div>
                        <div class="settings-flag-grid">
                            <label class="checkbox-label settings-flag-card">
                                <input type="checkbox" x-model="globalConfig.log_stdout">
                                <span class="checkbox-text" x-text="t('settings.logToStdout')"></span>
                            </label>
                            <label class="checkbox-label settings-flag-card">
                                <input type="checkbox" x-model="globalConfig.notifications.enabled">
                                <span class="checkbox-text" x-text="t('settings.desktopNotifications')"></span>
                            </label>
                            <label class="checkbox-label settings-flag-card">
                                <input type="checkbox" x-model="globalConfig.notifications.provider_switch">
                                <span class="checkbox-text" x-text="t('settings.notifyOnProviderSwitch')"></span>
                            </label>
                        </div>
                    </section>

                    <section class="settings-panel">
                        <div class="settings-panel-header">
                            <div>
                                <h3 x-text="t('settings.routingTitle')"></h3>
                                <p class="settings-panel-copy" x-text="t('settings.routingCopy')"></p>
                            </div>
                        </div>
                        <div class="settings-panel-grid">
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.stickySessionTtl')"></label>
                                <input type="text" x-model="globalConfig.routing.sticky_sessions.explicit_ttl"
                                    class="form-input">
                                <div class="form-hint" x-text="t('settings.stickySessionTtlHint')"></div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.shortRetryAfterMax')"></label>
                                <input type="text"
                                    x-model="globalConfig.routing.busy_backpressure.short_retry_after_max"
                                    class="form-input">
                                <div class="form-hint" x-text="t('settings.shortRetryAfterMaxHint')"></div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" x-text="t('settings.maxInlineWait')"></label>
                                <input type="text" x-model="globalConfig.routing.busy_backpressure.max_inline_wait"
                                    class="form-input">
                                <div class="form-hint" x-text="t('settings.maxInlineWaitHint')"></div>
                            </div>
                        </div>
                        <div class="settings-flag-grid">
                            <label class="checkbox-label settings-flag-card">
                                <input type="checkbox" x-model="globalConfig.routing.sticky_sessions.enabled">
                                <span class="checkbox-text" x-text="t('settings.enableStickySessions')"></span>
                            </label>
                            <label class="checkbox-label settings-flag-card">
                                <input type="checkbox" x-model="globalConfig.routing.busy_backpressure.enabled">
                                <span class="checkbox-text" x-text="t('settings.enableBusyBackpressure')"></span>
                            </label>
                        </div>
                    </section>
                </div>

                <div class="settings-form-actions">
                    <div class="form-hint" x-text="t('settings.footerHint')"></div>
                    <div class="settings-toolbar-actions">
                        <button type="button" @click="loadGlobalConfig()" class="btn btn-secondary"
                            x-text="t('common.reset')"></button>
                        <button type="button" @click="exportConfig()" class="btn btn-secondary"
                            x-text="t('common.export')"></button>
                        <button type="submit" class="btn btn-primary" x-text="t('settings.saveSettings')"></button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Integrations Tab -->
        <div id="tab-integrations" role="tabpanel" aria-labelledby="tabbtn-integrations"
            x-show="activeTab === 'integrations'" x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
            <div class="card-grid">
                <div class="card takeover-page__panel" style="grid-column: 1 / -1;">
                    <div class="takeover-page__header">
                        <div>
                            <h3 class="provider-name" x-text="t('integrations.title')"></h3>
                            <div class="takeover-page__copy" x-text="t('integrations.subtitle')"></div>
                        </div>
                        <div class="takeover-page__metrics">
                            <button type="button" class="pill pill--xs pill--neutral pill--mono pill-secondary"
                                @click="loadIntegrations()" x-text="t('integrations.refresh')"></button>
                        </div>
                    </div>
                    <div class="form-hint" x-text="t('integrations.userConfigHint')"></div>
                    <div class="form-hint" style="margin-top: 8px;" x-text="t('integrations.restartHint')"></div>
                </div>

                <template x-if="integrations.length === 0">
                    <div class="card u-text-center" style="grid-column: 1 / -1; padding: 48px;">
                        <p style="color: var(--text-secondary)" x-text="t('integrations.empty')"></p>
                    </div>
                </template>

                <template x-for="integration in integrations" :key="integration.product">
                    <div class="card integration-card">
                        <div class="integration-card-header">
                            <h3 class="provider-name integration-card-heading" x-text="integration.name"></h3>
                            <span class="pill pill--compact pill--neutral pill--mono integration-card-status"
                                :class="integrationStateClass(integration.state)"
                                x-text="integrationStateLabel(integration.state)"></span>
                        </div>

                        <div class="integration-card-actions integration-card-actions-right">
                            <span class="action-shell"
                                :class="integrationActionDisabledReason(integration, 'apply') ? 'tooltip action-tooltip is-disabled' : ''"
                                :tabindex="integrationActionDisabledReason(integration, 'apply') ? 0 : null"
                                :aria-label="integrationActionDisabledReason(integration, 'apply') || null">
                                <button type="button" class="action-btn action-btn--primary"
                                    :class="integrationActionIsBusy(integration, 'apply') ? 'action-btn--busy' : ''"
                                    :disabled="integrationBusyProduct === integration.product || integration.state === 'configured'"
                                    @click="runIntegrationAction(integration.product, 'apply')"
                                    x-text="integrationActionIsBusy(integration, 'apply') ? t('common.working') : integrationApplyLabel()">
                                </button>
                                <span x-show="integrationActionDisabledReason(integration, 'apply')"
                                    class="tooltip-content"
                                    x-text="integrationActionDisabledReason(integration, 'apply')"></span>
                            </span>
                            <span class="action-shell"
                                :class="integrationActionDisabledReason(integration, 'rollback') ? 'tooltip action-tooltip is-disabled' : ''"
                                :tabindex="integrationActionDisabledReason(integration, 'rollback') ? 0 : null"
                                :aria-label="integrationActionDisabledReason(integration, 'rollback') || null">
                                <button type="button" class="action-btn action-btn--secondary"
                                    :class="integrationActionIsBusy(integration, 'rollback') ? 'action-btn--busy' : ''"
                                    :disabled="integrationBusyProduct === integration.product || integration.state !== 'configured' || !integration.backup_available"
                                    @click="runIntegrationAction(integration.product, 'rollback')"
                                    x-text="integrationActionIsBusy(integration, 'rollback') ? t('common.working') : integrationRollbackLabel()">
                                </button>
                                <span x-show="integrationActionDisabledReason(integration, 'rollback')"
                                    class="tooltip-content"
                                    x-text="integrationActionDisabledReason(integration, 'rollback')"></span>
                            </span>
                        </div>

                        <template x-if="integrationResultFor(integration)">
                            <div class="integration-result"
                                :class="integrationResultClass(integrationResultFor(integration))">
                                <div class="integration-result__header">
                                    <span class="badge badge--xs badge--mono integration-result__badge"
                                        :class="integrationResultBadgeClass(integrationResultFor(integration))"
                                        x-text="integrationResultBadgeLabel(integrationResultFor(integration).type)"></span>
                                    <button type="button" class="integration-result__dismiss"
                                        @click="clearIntegrationResult(integration.product)"
                                        :aria-label="t('integrations.dismissResult')">×</button>
                                </div>
                                <div class="integration-result__title" x-text="integrationResultFor(integration).title">
                                </div>
                                <div class="integration-result__message"
                                    x-text="integrationResultFor(integration).message"></div>
                            </div>
                        </template>

                        <details class="integration-preview-details">
                            <summary class="form-hint integration-card-summary integration-card-summary-row">
                                <span class="integration-card-summary-label"
                                    x-text="t('integrations.detailsPreview')"></span>
                                <span class="integration-card-summary-meta"
                                    x-text="integrationBackupMeta(integration)"></span>
                            </summary>

                            <div class="integration-preview-grid" style="margin-top: 12px;">
                                <div class="integration-preview-panel">
                                    <div class="kv-label" x-text="t('integrations.currentFile')"></div>
                                    <pre class="integration-preview-code"
                                        x-text="integrationPreviewValue(integration.current_content, integrationCurrentPreviewEmptyLabel())"></pre>
                                </div>
                                <div class="integration-preview-panel">
                                    <div class="kv-label" x-text="integrationSecondaryPreviewLabel(integration)"></div>
                                    <pre class="integration-preview-code"
                                        x-text="integrationPreviewValue(integrationSecondaryPreviewContent(integration), integrationSecondaryPreviewEmptyLabel(integration))"></pre>
                                </div>
                            </div>
                        </details>
                    </div>
                </template>
            </div>
        </div>

        <!-- Services Tab -->
        <div id="tab-services" role="tabpanel" aria-labelledby="tabbtn-services" x-show="activeTab === 'services'"
            x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2"
            x-transition:enter-end="opacity-100 translate-y-0">
            <div class="card-grid">
                <div class="card service-panel" style="grid-column: 1 / -1;">
                    <div class="service-panel__header">
                        <div>
                            <h3 class="provider-name" x-text="t('services.title')"></h3>
                            <div class="service-panel__copy" x-text="t('services.subtitle')"></div>
                        </div>
                        <div class="service-panel__metrics">
                            <button type="button" class="pill pill--sm pill--neutral pill--mono" disabled
                                :class="serviceStatus.supported ? 'pill-success' : 'pill-danger'"
                                x-text="serviceStatus.supported ? t('services.supported') : t('services.unsupported')"></button>
                            <button type="button" class="pill pill--sm pill--neutral pill--mono" disabled
                                :class="serviceStatus.installed ? 'pill-success' : 'pill-warning'"
                                x-text="serviceStatus.installed ? t('services.installed') : t('services.notInstalled')"></button>
                            <button type="button" class="pill pill--sm pill--neutral pill--mono" disabled
                                :class="serviceRuntimeClass()" x-text="serviceRuntimeLabel()"></button>
                        </div>
                    </div>

                    <template x-if="!serviceStatus.supported">
                        <div class="card u-text-center" style="grid-column: 1 / -1; padding: 40px;">
                            <p style="color: var(--text-secondary); margin-bottom: 10px;"
                                x-text="t('services.unsupportedBuild')"></p>
                            <p class="form-hint" x-show="serviceStatus.error" x-text="serviceStatus.error"></p>
                        </div>
                    </template>

                    <template x-if="serviceStatus.supported && !serviceStatus.installed">
                        <div class="card u-text-center" style="grid-column: 1 / -1; padding: 40px;">
                            <p style="color: var(--text-primary); font-weight: 600; margin-bottom: 10px;"
                                x-text="t('services.autostartNotInstalled')"></p>
                            <p style="color: var(--text-secondary); margin-bottom: 18px;">
                                <template x-if="serviceStatus.os === 'windows'">
                                    <span x-text="t('services.installWindows')"></span>
                                </template>
                                <template x-if="serviceStatus.os !== 'windows'">
                                    <span x-text="t('services.installOther')"></span>
                                </template>
                            </p>
                            <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                                <template x-if="serviceStatus.os === 'windows'">
                                    <button type="button" class="btn btn-primary" @click="copyServiceInstallCommand()"
                                        x-text="t('services.copyInstallCommand')"></button>
                                </template>
                                <template x-if="serviceStatus.os !== 'windows'">
                                    <button type="button" class="btn btn-primary" @click="serviceAction('install')"
                                        x-text="t('services.installService')"></button>
                                </template>
                                <button type="button" class="btn btn-secondary" @click="loadServiceStatus()"
                                    x-text="t('common.refresh')"></button>
                            </div>
                            <div class="form-hint" style="margin-top: 14px;">
                                <template x-if="serviceStatus.install_command">
                                    <div>
                                        <div style="margin-bottom: 10px;" x-show="serviceStatus.install_hint"
                                            x-text="serviceStatus.install_hint"></div>
                                        <pre class="log-output" x-text="serviceStatus.install_command"></pre>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <div class="service-action-layout" x-show="serviceStatus.supported && serviceStatus.installed">
                        <div class="service-action-main-row">
                            <div class="service-action-group">
                                <span class="action-shell"
                                    :class="serviceActionDisabledReason('start') ? 'tooltip action-tooltip is-disabled' : ''"
                                    :tabindex="serviceActionDisabledReason('start') ? 0 : null"
                                    :aria-label="serviceActionDisabledReason('start') || null">
                                    <button type="button" class="action-btn"
                                        :class="[!serviceStatus.running ? 'action-btn--primary' : 'action-btn--secondary', serviceActionIsBusy('start') ? 'action-btn--busy' : '']"
                                        :disabled="serviceBusyAction !== '' || !!serviceActionDisabledReason('start')"
                                        @click="serviceAction('start')"
                                        x-text="serviceActionIsBusy('start') ? t('common.working') : t('services.start')">
                                    </button>
                                    <span x-show="serviceActionDisabledReason('start')" class="tooltip-content"
                                        x-text="serviceActionDisabledReason('start')"></span>
                                </span>
                                <span class="action-shell"
                                    :class="serviceActionDisabledReason('restart') ? 'tooltip action-tooltip is-disabled' : ''"
                                    :tabindex="serviceActionDisabledReason('restart') ? 0 : null"
                                    :aria-label="serviceActionDisabledReason('restart') || null">
                                    <button type="button" class="action-btn"
                                        :class="[serviceStatus.running ? 'action-btn--primary' : 'action-btn--secondary', serviceActionIsBusy('restart') ? 'action-btn--busy' : '']"
                                        :disabled="serviceBusyAction !== '' || !!serviceActionDisabledReason('restart')"
                                        @click="serviceAction('restart')"
                                        x-text="serviceActionIsBusy('restart') ? t('common.working') : t('services.restart')">
                                    </button>
                                    <span x-show="serviceActionDisabledReason('restart')" class="tooltip-content"
                                        x-text="serviceActionDisabledReason('restart')"></span>
                                </span>
                                <span class="action-shell"
                                    :class="serviceActionDisabledReason('stop') ? 'tooltip action-tooltip is-disabled' : ''"
                                    :tabindex="serviceActionDisabledReason('stop') ? 0 : null"
                                    :aria-label="serviceActionDisabledReason('stop') || null">
                                    <button type="button" class="action-btn action-btn--secondary"
                                        :class="serviceActionIsBusy('stop') ? 'action-btn--busy' : ''"
                                        :disabled="serviceBusyAction !== '' || !!serviceActionDisabledReason('stop')"
                                        @click="serviceAction('stop')"
                                        x-text="serviceActionIsBusy('stop') ? t('common.working') : t('services.stop')">
                                    </button>
                                    <span x-show="serviceActionDisabledReason('stop')" class="tooltip-content"
                                        x-text="serviceActionDisabledReason('stop')"></span>
                                </span>
                                <span class="action-shell"
                                    :class="serviceActionDisabledReason('uninstall') ? 'tooltip action-tooltip is-disabled' : ''"
                                    :tabindex="serviceActionDisabledReason('uninstall') ? 0 : null"
                                    :aria-label="serviceActionDisabledReason('uninstall') || null">
                                    <button type="button" class="action-btn action-btn--danger"
                                        :class="serviceActionIsBusy('uninstall') ? 'action-btn--busy' : ''"
                                        :disabled="serviceBusyAction !== '' || !!serviceActionDisabledReason('uninstall')"
                                        @click="serviceAction('uninstall')"
                                        x-text="serviceActionIsBusy('uninstall') ? t('common.working') : t('services.uninstall')">
                                    </button>
                                    <span x-show="serviceActionDisabledReason('uninstall')" class="tooltip-content"
                                        x-text="serviceActionDisabledReason('uninstall')"></span>
                                </span>
                                <button type="button" class="action-btn action-btn--secondary"
                                    @click="loadServiceStatus()" x-text="t('services.check')"></button>
                            </div>

                            <div class="service-action-secondary-row service-action-aside">
                                <label class="checkbox-label service-force-toggle" :title="t('services.forceHint')">
                                    <input type="checkbox" x-model="serviceForm.force">
                                    <span class="checkbox-text" x-text="t('services.force')"></span>
                                </label>

                                <span class="action-shell"
                                    :class="serviceActionDisabledReason('install') ? 'tooltip action-tooltip is-disabled' : ''"
                                    :tabindex="serviceActionDisabledReason('install') ? 0 : null"
                                    :aria-label="serviceActionDisabledReason('install') || null">
                                    <button type="button" class="action-btn action-btn--secondary"
                                        :class="serviceActionIsBusy('install') ? 'action-btn--busy' : ''"
                                        :disabled="serviceBusyAction !== '' || !!serviceActionDisabledReason('install')"
                                        @click="serviceAction('install')"
                                        x-text="serviceActionIsBusy('install') ? t('common.working') : t('services.reinstall')">
                                    </button>
                                    <span x-show="serviceActionDisabledReason('install')" class="tooltip-content"
                                        x-text="serviceActionDisabledReason('install')"></span>
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="form-hint" style="margin-bottom: 12px;"
                        x-show="serviceStatus.supported && serviceStatus.installed"
                        x-text="t('services.restartDisconnectHint')"></div>

                    <pre class="log-output"
                        x-show="serviceStatus.supported && serviceStatus.installed && !!serviceStatus.output"
                        x-text="serviceStatus.output || ''"></pre>
                </div>
            </div>
        </div>

        <!-- Status Tab -->
        <div id="tab-status" role="tabpanel" aria-labelledby="tabbtn-status" x-show="activeTab === 'status'"
            x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2"
            x-transition:enter-end="opacity-100 translate-y-0">
            <div class="card-grid">
                <div class="card status-card status-system-card" style="grid-column: 1 / -1;">
                    <div class="status-card__header">
                        <h3 class="provider-name status-card__title" x-text="statusSystemInfoLabel()"></h3>
                    </div>
                    <div class="kv-grid">
                        <div class="kv-item">
                            <div class="kv-label" x-text="t('statusPage.uptime')"></div>
                            <div class="kv-value" x-text="status.uptime"></div>
                        </div>
                        <div class="kv-item">
                            <div class="kv-label" x-text="t('statusPage.configDir')"></div>
                            <div class="kv-value" x-text="status.config_dir"></div>
                        </div>
                        <div class="kv-item">
                            <div class="kv-label" x-text="t('statusPage.circuitBreaker')"></div>
                            <div class="kv-value">
                                <span x-show="globalConfig.circuit_breaker.failure_threshold > 0">
                                    <span x-text="statusCircuitBreakerSummary()"></span>
                                </span>
                                <span x-show="globalConfig.circuit_breaker.failure_threshold <= 0" class="text-tertiary"
                                    x-text="t('statusPage.disabled')"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <template x-for="(client, name) in status.clients" :key="name">
                    <div class="card status-card">
                        <div class="status-card__header">
                            <div class="status-card__heading">
                                <div class="status-card__title-row">
                                    <h3 class="provider-name status-card__title" x-text="clientLabel(name)"></h3>
                                    <span class="status-card__mode pill" x-text="statusModeLabel(client.mode)"></span>
                                </div>
                                <div class="status-card__meta">
                                    <template x-if="(client.mode || '') === 'manual'">
                                        <span class="status-card__meta-label" x-text="t('statusPage.pinned')"></span>
                                    </template>
                                    <template x-if="(client.mode || '') === 'manual'">
                                        <span class="pill pill--xs pill--neutral pill--mono"
                                            x-text="client.pinned_provider || t('common.none')"></span>
                                    </template>
                                </div>
                            </div>
                            <div class="status-card__metrics">
                                <span class="pill pill--compact pill--neutral pill--mono"
                                    x-text="statusMetricProviders(client.provider_count)"></span>
                                <span class="pill pill--compact pill--neutral pill--mono"
                                    x-text="statusMetricEnabled((client.enabled_providers && client.enabled_providers.length) || 0)"></span>
                            </div>
                        </div>
                        <div class="status-card__activity" x-show="client.last_switch || client.last_request">
                            <div class="status-card__activity-title" x-text="t('statusPage.recentActivity')"></div>
                            <div class="status-card__activity-item" x-show="client.last_switch">
                                <span x-text="t('statusPage.lastSwitch')"></span>
                                <span
                                    x-text="(client.last_switch && client.last_switch.label) ? client.last_switch.label : ''"></span>
                                <span
                                    x-text="(client.last_switch && client.last_switch.detail) ? client.last_switch.detail : ''"></span>
                                <span
                                    x-text="(client.last_switch && client.last_switch.at) ? client.last_switch.at : ''"></span>
                            </div>
                            <div class="status-card__activity-item" x-show="client.last_request">
                                <span x-text="t('statusPage.lastRequest')"></span>
                                <span
                                    x-text="(client.last_request && client.last_request.label) ? client.last_request.label : ''"></span>
                                <span
                                    x-text="(client.last_request && client.last_request.detail) ? client.last_request.detail : ''"></span>
                                <span
                                    x-text="(client.last_request && client.last_request.bytes) ? ('(' + client.last_request.bytes + ' bytes)') : ''"></span>
                                <span
                                    x-text="(client.last_request && client.last_request.at) ? client.last_request.at : ''"></span>
                            </div>
                        </div>
                        <div class="status-card__groups">
                            <template x-for="group in providerStatusGroups(client)" :key="group.key">
                                <div class="status-card__group">
                                    <div class="status-card__group-label" x-text="group.label"></div>
                                    <div class="chips status-card__group-chips">
                                        <template x-for="p in providerStatusEntries(client, group.key)"
                                            :key="group.key + ':' + p.name">
                                            <span class="chip pill pill-sm"
                                                :class="providerStatusChipClass(group.key, p)"
                                                :title="providerStatusTitle(p)" x-text="providerStatusLabel(p)"></span>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-backdrop" :class="{'show': showAddProviderModal || showEditProviderModal}"
        @keydown.escape.window="closeModals()" @click.self="closeModals()">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-header">
                <h2 id="modal-title"
                    x-text="showEditProviderModal ? t('modal.provider.editTitle') : t('modal.provider.addTitle')"></h2>
                <button @click="closeModals()" class="icon-btn" style="font-size: 18px;"
                    :aria-label="t('modal.provider.close')">
                    &times;
                </button>
            </div>
            <form @submit.prevent="saveProvider()">
                <div class="modal-body form-horizontal-grid">
                    <label class="form-label" x-text="t('modal.provider.name')"></label>
                    <div class="form-control-wrap">
                        <input type="text" x-model="providerForm.name" class="form-input" required
                            placeholder="e.g. provider-primary">
                        <div class="form-hint" style="font-size: 11px;" x-text="t('modal.provider.nameHint')"></div>
                    </div>

                    <label class="form-label" x-text="t('modal.provider.baseUrl')"></label>
                    <div class="form-control-wrap">
                        <input type="text" x-model="providerForm.base_url" class="form-input" required
                            placeholder="https://api.example.com">
                    </div>

                    <label class="form-label"
                        x-text="showEditProviderModal ? t('modal.provider.apiKeys') : t('modal.provider.apiKeysRequired')"></label>
                    <div class="form-control-wrap">
                        <textarea x-model="providerForm.api_keys_text" class="form-input form-textarea" rows="4"
                            :required="!showEditProviderModal"
                            :placeholder="t('modal.provider.onePerLine') + '\n\nsk-xxx\nsk-yyy'"></textarea>
                        <div class="form-meta"
                            style="opacity: 0.85; margin-top: 4px; flex-wrap: nowrap; overflow: auto; padding-bottom: 4px;">
                            <span class="form-meta-label" style="white-space: nowrap;"
                                x-text="t('modal.provider.savedAs')"></span>
                            <span class="pill pill--xs pill--neutral pill--mono"
                                x-text="t('modal.provider.savedAsSingle')"></span>
                            <span class="pill pill--xs pill--neutral pill--mono"
                                x-text="t('modal.provider.savedAsMultiple')"></span>
                        </div>
                        <div class="form-hint" x-show="showEditProviderModal && editingProviderKeyCount > 0"
                            x-text="providerEditKeyHint()"></div>
                    </div>

                    <div class="form-grid-full modal-form-grid" style="align-items: center;">
                        <div class="provider-overrides-field" style="margin-bottom: 0;">
                            <label class="form-label" x-text="t('modal.provider.priority')"></label>
                            <input type="number" x-model.number="providerForm.priority" class="form-input" min="1"
                                style="width: 100px;">
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <div class="toggle-layout" style="margin-top: 0;">
                                <label class="switch" :title="t('common.enabled')">
                                    <input type="checkbox" x-model="providerForm.enabled">
                                    <span class="slider"></span>
                                </label>
                                <span class="checkbox-text"
                                    :style="providerForm.enabled ? 'color: var(--success);' : 'color: var(--text-tertiary);'"
                                    x-text="providerForm.enabled ? t('common.enabled') : t('common.disabled')"></span>
                            </div>
                        </div>
                    </div>

                    <div class="form-grid-full form-group provider-overrides-group"
                        x-show="providerHasAnyOverrideSupport()" style="margin-top: 0;">
                        <div class="provider-overrides-header" x-text="t('modal.provider.overridesTitle')"></div>

                        <div class="provider-overrides-grid">
                            <div class="provider-overrides-field" x-show="providerSupportsModelOverride()">
                                <label class="form-label" x-text="t('modal.provider.model')"></label>
                                <input type="text" x-model="providerForm.model" class="form-input"
                                    :placeholder="t('modal.provider.modelHint')">
                            </div>

                            <div class="provider-overrides-field" x-show="providerSupportsReasoningEffort()">
                                <label class="form-label" x-text="t('modal.provider.reasoningEffort')"></label>
                                <input type="text" x-model="providerForm.reasoning_effort" class="form-input"
                                    placeholder="high">
                            </div>

                            <div class="provider-overrides-field" x-show="providerSupportsThinkingBudget()">
                                <label class="form-label" x-text="t('modal.provider.thinkingBudgetTokens')"></label>
                                <input type="number" x-model.number="providerForm.thinking_budget_tokens"
                                    class="form-input" min="0" placeholder="4096">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" @click="closeModals()" class="btn btn-secondary"
                        x-text="t('common.cancel')"></button>
                    <button type="submit" class="btn btn-primary" x-text="t('modal.provider.saveProvider')"></button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
