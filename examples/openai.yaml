# OpenAI-compatible upstream providers
# Preferred for OpenAI-compatible requests sent to http://127.0.0.1:3333/clipal
# Legacy alias: http://127.0.0.1:3333/codex
# Suitable for Codex CLI and many desktop clients with custom Base URL support.

mode: auto # auto | manual
pinned_provider: "" # required when mode=manual

providers:
  # Primary provider - OpenAI compatible API
  - name: "openai-compatible"
    base_url: "https://api.openai.com"
    api_key: "sk-xxx"
    priority: 1
    enabled: true

  # Fallback provider - OpenRouter with multiple keys
  - name: "openrouter"
    base_url: "https://openrouter.ai/api"
    api_keys:
      - "sk-or-xxx"
      - "sk-or-yyy"
    priority: 2
    enabled: true
