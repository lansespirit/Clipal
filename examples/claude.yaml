# Claude-style upstream providers
# Preferred for Claude-style requests sent to http://127.0.0.1:3333/clipal
# Legacy alias: http://127.0.0.1:3333/claudecode

mode: auto # auto | manual
pinned_provider: "" # required when mode=manual

providers:
  # Primary provider - Anthropic official API
  - name: "anthropic-direct"
    base_url: "https://api.anthropic.com"
    api_key: "sk-ant-xxx"
    priority: 1
    enabled: true

  # Fallback provider - OpenRouter with multiple keys
  - name: "openrouter"
    base_url: "https://openrouter.ai/api"
    api_keys:
      - "sk-or-xxx"
      - "sk-or-yyy"
    priority: 2
    enabled: true

  # Backup provider (disabled by default)
  - name: "backup-provider"
    base_url: "https://backup.example.com"
    api_key: "sk-backup-xxx"
    priority: 3
    enabled: false
