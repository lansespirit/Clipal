# Global configuration for Clipal
# Copy to ~/.clipal/config.yaml

listen_addr: 127.0.0.1
port: 3333
log_level: info # debug | info | warn | error

# How long auth/billing/quota failures keep a provider temporarily unavailable.
# Set to 0 to disable that temporary deactivation behavior.
reactivate_after: 1h

# Cancel an upstream attempt if no response body bytes are received for this long.
# Useful for SSE streams that can hang after headers. Set to 0 to disable.
upstream_idle_timeout: 3m

# How long to wait for upstream response headers after the request is written.
# Set to 0 to disable.
response_header_timeout: 2m

# Max request body size in bytes (Clipal buffers request bodies for retries).
# Default: 33554432 (32 MiB)
# max_request_body_bytes: 33554432

# Default: <config-dir>/logs (for example ~/.clipal/logs)
# log_dir: ""
log_retention_days: 7 # 0 keeps logs forever; default 7 days
log_stdout: false # recommended for long-running background service; runtime default is true

# Circuit breaker (prevents repeated requests to unhealthy providers)
circuit_breaker:
  failure_threshold: 4 # set to 0 to disable
  success_threshold: 2
  open_timeout: 60s
  half_open_max_inflight: 1

# Sticky routing and busy backpressure
routing:
  sticky_sessions:
    enabled: true
    explicit_ttl: 30m
    cache_hint_ttl: 10m
    dynamic_feature_ttl: 10m
    dynamic_feature_capacity: 1024
    response_lookup_ttl: 15m
  busy_backpressure:
    enabled: true
    retry_delays:
      - 5s
      - 10s
    probe_max_inflight: 1
    short_retry_after_max: 3s
    max_inline_wait: 8s

# Desktop notifications (best-effort, cross-platform via beeep)
# notifications:
#   enabled: false
#   min_level: error   # debug | info | warn | error
#   provider_switch: true
