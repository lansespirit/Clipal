version: "2"

linters:
  default: none
  enable:
    - depguard
    - errcheck
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused

  settings:
    depguard:
      rules:
        cmd-main-assembly:
          list-mode: original
          files:
            - "cmd/clipal/main.go"
          deny:
            - pkg: github.com/lansespirit/Clipal/internal/logger
              desc: "cmd/clipal/main.go should configure runtime through internal/app"
            - pkg: github.com/lansespirit/Clipal/internal/notify
              desc: "cmd/clipal/main.go should configure runtime through internal/app"
            - pkg: github.com/lansespirit/Clipal/internal/proxy
              desc: "cmd/clipal/main.go should configure runtime through internal/app"
            - pkg: github.com/lansespirit/Clipal/internal/web
              desc: "cmd/clipal/main.go should configure runtime through internal/app"
        service-no-runtime-deps:
          list-mode: original
          files:
            - "**/internal/service/**"
          deny:
            - pkg: github.com/lansespirit/Clipal/internal/app
              desc: "service must not depend on app bootstrap"
            - pkg: github.com/lansespirit/Clipal/internal/proxy
              desc: "service must not depend on proxy runtime"
            - pkg: github.com/lansespirit/Clipal/internal/web
              desc: "service must not depend on web handlers"
        config-no-runtime-deps:
          list-mode: original
          files:
            - "**/internal/config/**"
          deny:
            - pkg: github.com/lansespirit/Clipal/internal/app
              desc: "config must stay independent from app bootstrap"
            - pkg: github.com/lansespirit/Clipal/internal/logger
              desc: "config must stay independent from logger"
            - pkg: github.com/lansespirit/Clipal/internal/notify
              desc: "config must stay independent from notify"
            - pkg: github.com/lansespirit/Clipal/internal/proxy
              desc: "config must stay independent from proxy runtime"
            - pkg: github.com/lansespirit/Clipal/internal/service
              desc: "config must stay independent from service runtime"
            - pkg: github.com/lansespirit/Clipal/internal/web
              desc: "config must stay independent from web handlers"
    gosec:
      excludes:
        - G115
        - G304
      severity: high
      confidence: high
    errcheck:
      check-type-assertions: true
      disable-default-exclusions: true
      exclude-functions:
        - fmt.Print
        - fmt.Printf
        - fmt.Println
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    ineffassign:
      check-escaping-errors: true
    staticcheck:
      initialisms: ["API", "ASCII", "CPU", "CSS", "DNS", "EOF", "GUID", "HTML", "HTTP", "HTTPS", "ID", "IP", "JSON", "QPS", "RAM", "RPC", "SLA", "SMTP", "SQL", "SSH", "TCP", "TLS", "TTL", "UDP", "UI", "UID", "UUID", "URI", "URL", "UTF8", "VM", "XML"]
      checks:
        - all
        - -ST1000
        - -ST1020
        - -ST1021
        - -ST1022
    unused:
      field-writes-are-uses: true
      post-statements-are-reads: true
      exported-fields-are-used: true
      parameters-are-used: true
      local-variables-are-used: false

formatters:
  enable:
    - gofmt
